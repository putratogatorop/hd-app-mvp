<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Häagen-Dazs ID · Customer App UI Kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Jost:ital,wght@0,300..700;1,300..700&family=JetBrains+Mono:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #40061E; min-height: 100vh; font-family: 'Jost', sans-serif; color: #2B2B2B; }
  .stage { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 48px 24px; gap: 32px; }
  .crumbs { color: #FEF2E3; font-family: 'Jost', sans-serif; text-align: center; max-width: 640px; }
  .crumbs .eye { font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; opacity: 0.7; }
  .crumbs h1 { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 40px; line-height: 1; letter-spacing: -0.02em; margin: 16px 0 10px; font-weight: 500; }
  .crumbs h1 i { font-weight: 400; }
  .crumbs p { opacity: 0.65; font-size: 14px; margin: 0; line-height: 1.5; }
  .tabs { display: flex; gap: 0; background: rgba(254,242,227,0.08); border: 1px solid rgba(254,242,227,0.15); }
  .tabs button { background: transparent; border: none; color: rgba(254,242,227,0.7); padding: 10px 18px; font-family: 'Jost', sans-serif; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; cursor: pointer; transition: all 300ms; }
  .tabs button.active { background: #FEF2E3; color: #650A30; }
  .tabs button + button { border-left: 1px solid rgba(254,242,227,0.15); }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  .phone-wrap { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
  .foot { color: rgba(254,242,227,0.4); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; }

  /* Keyboard focus ring — matches burgundy, high-contrast on both cream and burgundy surfaces */
  button:focus-visible, a:focus-visible, [role="tab"]:focus-visible {
    outline: 2px solid #650A30;
    outline-offset: 2px;
  }
  /* Tap feedback — subtle press acknowledgment across every tappable surface */
  .tap { transition: transform 120ms ease, opacity 120ms ease; }
  .tap:active { transform: scale(0.98); opacity: 0.85; }

  /* Simple reveal-up animation used by the Account detail sheet */
  @keyframes revealUp { from { transform: translateY(16px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
  :root { --ease-editorial: cubic-bezier(0.2,0.8,0.2,1); }

  /* Applied-voucher pulse */
  @keyframes appliedFlash { 0% { background: rgba(101,10,48,0.08) } 100% { background: transparent } }
  .applied-flash { animation: appliedFlash 700ms ease-out; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx?v=2"></script>
<script type="text/babel" src="atoms.jsx?v=2"></script>
<script type="text/babel" src="screens.jsx?v=2"></script>

<script type="text/babel">
const { useState } = React;
// IOSFrame is from starter — exposed as window.IOSFrame
const Frame = ({ children }) => React.createElement(window.IOSDevice, { width: 390, height: 820 }, children);

const FEATURED = [
  { id: 1, name: 'The ice cream library', price: 'From Rp 65.000', image: '../../assets/imagery/menu-ice-cream-flavors.jpg' },
  { id: 2, name: 'Love the Mix — the range', price: 'From Rp 78.000', image: '../../assets/imagery/menu-love-the-mix.jpg' },
  { id: 3, name: 'Tea, all afternoon', price: 'From Rp 42.000', image: '../../assets/imagery/menu-drinks-tea.jpg' },
  { id: 4, name: 'A coffee moment', price: 'From Rp 38.000', image: '../../assets/imagery/menu-coffee-time.jpg' },
];

// New-this-week flavours — real HD ID rotation, surfaced in the horizontal "Baru minggu ini" row
const NEW_THIS_WEEK = [
  { id:'n1', name:'Blue Pea Sea Salt',      price:'Rp 78.000', image:'../../assets/imagery/flavor-blue-pea-sea-salt.jpg', badge:'Baru' },
  { id:'n2', name:'Matcha Pint',            price:'Rp 72.000', image:'../../assets/imagery/flavor-matcha-pint.jpg',       badge:'Signature' },
  { id:'n3', name:'Banana Caramel Frappe',  price:'Rp 68.000', image:'../../assets/imagery/flavor-banana-caramel.jpg',    badge:'Baru' },
  { id:'n4', name:'Raspberry Sorbet',       price:'Rp 65.000', image:'../../assets/imagery/flavor-raspberry-sorbet.jpg',  badge:'Saison' },
];

// Hero carousel slides — real HD ID campaign pillars, auto-advance every 5.5s, dot-navigable
const HERO_SLIDES = [
  { img:'../../assets/imagery/hero-home-creation.jpg', tag:'Home Creation', title:'Blue Pea,', titleItalic:'Sea Salt',    caption:'Floral. Creamy. Slightly salty.' },
  { img:'../../assets/imagery/hero-hampers.jpg',       tag:'Hampers',       title:'Sealed,',   titleItalic:'with a note', caption:'Send a pint the way a letter is sent.' },
  { img:'../../assets/imagery/hero-matcha.jpg',        tag:'Signature',     title:'Matcha,',   titleItalic:'always',      caption:'The one we keep coming back to.' },
];

function HeroCarousel({ onOpenSlide }) {
  const [i, setI] = React.useState(0);
  const len = HERO_SLIDES.length;
  React.useEffect(() => {
    const t = window.setInterval(() => setI(p => (p + 1) % len), 5500);
    return () => window.clearInterval(t);
  }, [len]);
  const active = HERO_SLIDES[i];
  return (
    <section aria-label="Featured promotions" style={{ padding:'20px 16px 0', background:'#FEF2E3' }}>
      <div role="region" aria-roledescription="carousel" aria-live="polite"
        style={{ position:'relative', aspectRatio:'16/10', overflow:'hidden', background:'#40061E' }}>
        {HERO_SLIDES.map((s, idx) => (
          <div key={idx} aria-hidden={idx !== i}
            style={{ position:'absolute', inset:0, opacity: idx === i ? 1 : 0,
              transition:'opacity 700ms var(--ease-editorial)',
              pointerEvents: idx === i ? 'auto' : 'none' }}>
            <img src={s.img} alt="" style={{ width:'100%', height:'100%', objectFit:'cover' }} />
            <div aria-hidden="true" style={{ position:'absolute', inset:0,
              background:'linear-gradient(to bottom, rgba(64,6,30,0.15) 0%, rgba(64,6,30,0) 35%, rgba(64,6,30,0.5) 78%, rgba(64,6,30,0.78) 100%)' }} />
            <div style={{ position:'absolute', left:20, right:20, bottom:20, color:'#FEF2E3' }}>
              <span style={{ display:'inline-block', fontFamily:"'Jost', sans-serif", fontSize:10, letterSpacing:'0.22em', textTransform:'uppercase', color:'#F5E6C8', border:'1px solid rgba(245,230,200,0.6)', padding:'3px 8px' }}>{s.tag}</span>
              <h2 style={{ fontFamily:"'Cormorant Garamond', Georgia, serif", fontSize:30, lineHeight:0.98, letterSpacing:'-0.02em', margin:'10px 0 0', fontWeight:500, color:'#FEF2E3' }}>
                {s.title} <span style={{ fontStyle:'italic', fontWeight:400 }}>{s.titleItalic}</span>
              </h2>
              <div style={{ marginTop:6, fontFamily:"'Cormorant Garamond', Georgia, serif", fontStyle:'italic', fontSize:13, color:'rgba(254,242,227,0.9)' }}>{s.caption}</div>
            </div>
          </div>
        ))}
        <button type="button" className="tap"
          onClick={() => onOpenSlide && onOpenSlide(active, i)}
          aria-label={`Open promotion: ${active.tag} — ${active.title} ${active.titleItalic}`}
          style={{ position:'absolute', inset:0, background:'transparent', border:'none', cursor:'pointer', padding:0 }} />
      </div>
      {/* dots + counter */}
      <div style={{ marginTop:10, display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 4px' }}>
        <div style={{ display:'flex', gap:2 }}>
          {HERO_SLIDES.map((_, idx) => (
            <button key={idx} type="button"
              onClick={() => setI(idx)}
              aria-label={`Slide ${idx + 1} of ${len}`} aria-current={idx === i ? 'true' : undefined}
              style={{ width:44, height:44, minWidth:44, minHeight:44,
                display:'inline-flex', alignItems:'center', justifyContent:'center',
                background:'transparent', border:'none', padding:0, cursor:'pointer' }}>
              <span aria-hidden="true" style={{
                display:'block', width: idx === i ? 20 : 6, height:2,
                background: idx === i ? '#650A30' : 'rgba(43,43,43,0.25)',
                transition:'width 300ms var(--ease-editorial), background 300ms',
              }} />
            </button>
          ))}
        </div>
        <span style={{ ...hdAtomStyles.numeral, fontSize:10, color:'rgba(43,43,43,0.6)' }}>
          {String(i + 1).padStart(2, '0')} / {String(len).padStart(2, '0')}
        </span>
      </div>
    </section>
  );
}

// Feature grid pen-line illustrations
function HDIconGift() { return (
  <svg width="44" height="44" viewBox="0 0 48 48" fill="none" aria-hidden="true">
    <rect x="7" y="19" width="34" height="22" stroke="#650A30" strokeWidth="1.4" />
    <rect x="5" y="14" width="38" height="7" stroke="#650A30" strokeWidth="1.4" />
    <path d="M24 14V41" stroke="#650A30" strokeWidth="1.4" />
    <path d="M24 14c-3-4-10-4-10 0s4 4 10 0Z" stroke="#650A30" strokeWidth="1.4" />
    <path d="M24 14c3-4 10-4 10 0s-4 4-10 0Z" stroke="#650A30" strokeWidth="1.4" />
  </svg>
); }
function HDIconCatering() { return (
  <svg width="44" height="44" viewBox="0 0 48 48" fill="none" aria-hidden="true">
    <path d="M8 31c0-5 7-9 16-9s16 4 16 9H8Z" stroke="#650A30" strokeWidth="1.4" />
    <rect x="6" y="31" width="36" height="6" stroke="#650A30" strokeWidth="1.4" />
    <path d="M19 22l5-5 5 5" stroke="#650A30" strokeWidth="1.4" />
    <path d="M16 41h16" stroke="#650A30" strokeWidth="1.4" />
    <circle cx="18" cy="27" r="1.2" fill="#650A30" />
    <circle cx="24" cy="25" r="1.2" fill="#650A30" />
    <circle cx="30" cy="27" r="1.2" fill="#650A30" />
  </svg>
); }
function HDIconShare() { return (
  <svg width="44" height="44" viewBox="0 0 48 48" fill="none" aria-hidden="true">
    <circle cx="14" cy="17" r="5" stroke="#650A30" strokeWidth="1.4" />
    <circle cx="34" cy="13" r="4" stroke="#650A30" strokeWidth="1.4" />
    <circle cx="34" cy="33" r="4" stroke="#650A30" strokeWidth="1.4" />
    <path d="M19 17l11-3" stroke="#650A30" strokeWidth="1.4" />
    <path d="M19 19l11 11" stroke="#650A30" strokeWidth="1.4" />
  </svg>
); }
function HDIconPlan() { return (
  <svg width="44" height="44" viewBox="0 0 48 48" fill="none" aria-hidden="true">
    <path d="M24 8 12 16v20h24V16L24 8Z" stroke="#650A30" strokeWidth="1.4" strokeLinejoin="round" />
    <path d="M12 24h24" stroke="#650A30" strokeWidth="1.4" />
    <path d="M12 30h24" stroke="#650A30" strokeWidth="1.4" />
    <path d="M18 36V22" stroke="#650A30" strokeWidth="1.4" />
  </svg>
); }

const FEATURES = [
  { key:'gift',     title:'Kirim',    italic:'hadiah',  tag:'Nouveau', caption:'Sealed, with a note.',          Icon: HDIconGift,     to:'hadiah' },
  { key:'catering', title:'Catering', italic:null,      tag:null,      caption:'For the occasion.',             Icon: HDIconCatering, to:'menu' },
  { key:'share',    title:'Share',    italic:'the sip', tag:null,      caption:'Invite a friend, earn points.', Icon: HDIconShare,    to:'akun' },
  { key:'plan',     title:'MyHD',     italic:'Plan',    tag:'Baru',    caption:'A standing subscription.',      Icon: HDIconPlan,     to:'akun' },
];

// ───── HOME SCREEN ─────
function HomeScreen({ onAdd, onChangeTab }) {
  const [mode, setMode] = useState('delivery');
  const goto = onChangeTab || (() => {});
  return (
    <div style={{ minHeight:'100%', background:'#FEF2E3', paddingBottom: 'calc(96px + env(safe-area-inset-bottom))' }}>
      <Masthead />
      <HeroCarousel onOpenSlide={(s) => console.log('Open promo', s.tag)} />
      <MemberStrip points={1250} tier="Gold" target={2000} next="Platinum" onRewards={() => goto('hadiah')} />
      <OrderModes mode={mode} onSelect={setMode} />
      <Shortlist items={FEATURED} onAdd={onAdd} onAllClick={() => goto('menu')} />

      {/* Baru minggu ini — horizontal scroll with Baru / Saison badges */}
      <section style={{ padding:'40px 0 0' }}>
        <div style={{ padding:'0 20px' }}>
          <SectionHeader
            number={3} title="Baru" titleItalic="minggu ini"
            action={
              <button
                type="button" className="tap"
                onClick={() => goto('menu')}
                aria-label="See all new items"
                style={{ ...hdAtomStyles.eyebrow, fontSize:11, display:'inline-flex', gap:8, alignItems:'center',
                  cursor:'pointer', background:'transparent', border:'none', padding:'12px 8px',
                  minHeight:44, minWidth:44, font:'inherit' }}
              >See all <IconArrow size={12} /></button>
            }
          />
        </div>
        <div style={{ display:'flex', gap:12, overflowX:'auto', padding:'20px 20px 8px' }} className="no-scrollbar">
          {NEW_THIS_WEEK.map(it => (
            <button
              key={it.id} type="button" className="tap"
              onClick={() => onAdd(it)}
              aria-label={`Add ${it.name}, ${it.price}, ${it.badge}`}
              style={{ flexShrink:0, width:140, textAlign:'left', background:'transparent',
                border:'none', padding:0, cursor:'pointer' }}
            >
              <div style={{ position:'relative', aspectRatio:'1/1', background:'#F5E6C8', overflow:'hidden' }}>
                <img src={it.image} alt="" style={{ width:'100%', height:'100%', objectFit:'cover' }} />
                <span style={{
                  position:'absolute', top:8, left:8,
                  fontFamily:"'Jost', sans-serif", fontSize:9, letterSpacing:'0.2em',
                  textTransform:'uppercase', color:'#FEF2E3',
                  background:'#650A30', padding:'3px 7px', fontWeight:500,
                }}>{it.badge}</span>
              </div>
              <div style={{ marginTop:10 }}>
                <div style={{ fontFamily:"'Cormorant Garamond', Georgia, serif", fontSize:14,
                  lineHeight:1.2, letterSpacing:'-0.01em' }}>{it.name}</div>
                <div style={{ marginTop:4, fontFamily:"'JetBrains Mono', monospace",
                  fontSize:11, color:'#650A30', letterSpacing:'-0.01em' }}>{it.price}</div>
              </div>
            </button>
          ))}
        </div>
      </section>

      {/* Of note — 2×2 feature grid with pen-line illustrations (replaces list) */}
      <section style={{ padding:'40px 20px 0' }}>
        <SectionHeader number={4} title="Of" titleItalic="note" />
        <div style={{ marginTop:20, display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
          {FEATURES.map(f => {
            const Icon = f.Icon;
            return (
              <button
                key={f.key} type="button" className="tap"
                onClick={() => goto(f.to)}
                aria-label={`${f.title}${f.italic ? ' ' + f.italic : ''} — ${f.caption}`}
                style={{
                  display:'flex', flexDirection:'column', alignItems:'flex-start',
                  padding:'18px 16px 20px', minHeight:156,
                  background:'rgba(184,146,42,0.08)',
                  border:'1px solid rgba(43,43,43,0.12)',
                  textAlign:'left', cursor:'pointer',
                  font:'inherit', color:'inherit',
                  position:'relative',
                }}
              >
                {f.tag && (
                  <span style={{
                    position:'absolute', top:10, right:10,
                    fontFamily:"'Jost', sans-serif", fontSize:9, letterSpacing:'0.2em',
                    textTransform:'uppercase', color:'#650A30',
                    border:'1px solid rgba(101,10,48,0.4)', padding:'2px 6px', fontWeight:500,
                  }}>{f.tag}</span>
                )}
                <Icon />
                <div style={{ marginTop:14, fontFamily:"'Cormorant Garamond', Georgia, serif",
                  fontSize:22, lineHeight:1.05, letterSpacing:'-0.02em', fontWeight:500 }}>
                  {f.title}{f.italic && (<> <span style={{ fontStyle:'italic', fontWeight:400 }}>{f.italic}</span></>)}
                </div>
                <div style={{ marginTop:6, fontFamily:"'Cormorant Garamond', Georgia, serif",
                  fontStyle:'italic', fontSize:12, color:'rgba(43,43,43,0.75)' }}>{f.caption}</div>
              </button>
            );
          })}
        </div>
      </section>

      {/* Rewards unclaimed — tappable */}
      <section style={{ padding:'40px 20px 0' }}>
        <SectionHeader number={5} title="Rewards, unclaimed" />
        <button
          type="button" className="tap" onClick={() => goto('hadiah')}
          aria-label="Open rewards — 3 vouchers await collection"
          style={{ marginTop:24, display:'flex', alignItems:'baseline', gap:16, padding:'4px 0', background:'transparent', border:'none', cursor:'pointer', width:'100%', textAlign:'left' }}
        >
          <Numeral size={48} weight={500} color="#650A30">03</Numeral>
          <span style={{ fontFamily:"'Cormorant Garamond', Georgia, serif", fontStyle:'italic', fontSize:16, color:'rgba(43,43,43,0.75)' }}>vouchers await collection.</span>
        </button>
      </section>

      {/* Enquiries — phone now links to tel: */}
      <section style={{ padding:'40px 20px 40px' }}>
        <div style={{ borderTop:'1px solid #2B2B2B', paddingTop:24 }}>
          <Eyebrow small color="rgba(43,43,43,0.75)">Enquiries</Eyebrow>
          <div style={{ marginTop:12, display:'flex', alignItems:'baseline', justifyContent:'space-between', gap:12 }}>
            <a
              href="tel:+6281211118456" className="tap"
              aria-label="Call Häagen-Dazs enquiries"
              style={{ color:'#2B2B2B', textDecoration:'none', display:'inline-flex', minHeight:44, alignItems:'center' }}
            >
              <Numeral size={20}>0812 1111 8456</Numeral>
            </a>
            <span style={{ fontFamily:"'Cormorant Garamond', Georgia, serif", fontStyle:'italic', fontSize:13, color:'rgba(43,43,43,0.75)' }}>by chat, always</span>
          </div>
        </div>
        <p style={{ marginTop:40, fontSize:10, letterSpacing:'.2em', textTransform:'uppercase', color:'rgba(43,43,43,0.75)', textAlign:'center' }}>© Häagen-Dazs Indonesia · Savour the moment</p>
      </section>
    </div>
  );
}

// ───── MENU SCREEN ─────
const MENU_CATS = [
  { key:'ice', label:'Ice Cream', img:'../../assets/imagery/menu-ice-cream-flavors.jpg', items:[
    { id:1, name:'Vanilla Caramel Brownie', price:'Rp 65.000' },
    { id:2, name:'Belgian Chocolate', price:'Rp 62.000' },
    { id:3, name:'Salted Caramel', price:'Rp 65.000' },
  ]},
  { key:'mix', label:'The Mix', img:'../../assets/imagery/menu-love-the-mix.jpg', items:[
    { id:4, name:'Strawberry Shortcake', price:'Rp 95.000' },
    { id:5, name:'Tiramisu Affogato', price:'Rp 88.000' },
  ]},
  { key:'coffee', label:'Coffee', img:'../../assets/imagery/menu-coffee-time.jpg', items:[
    { id:6, name:'Espresso, doubled', price:'Rp 38.000' },
    { id:7, name:'Flat White', price:'Rp 48.000' },
  ]},
  { key:'tea', label:'Tea', img:'../../assets/imagery/menu-drinks-tea.jpg', items:[
    { id:8, name:'Iced Matcha Latte', price:'Rp 42.000' },
    { id:9, name:'Earl Grey Float', price:'Rp 55.000' },
  ]},
];

function MenuScreen({ onAdd, cart = [] }) {
  const [cat, setCat] = useState('ice');
  const current = MENU_CATS.find(c => c.key === cat);
  const qtyFor = (id) => cart.filter(x => x.id === id).length;
  return (
    <div style={{ minHeight:'100%', background:'#FEF2E3', paddingBottom: 'calc(96px + env(safe-area-inset-bottom))' }}>
      {/* Header */}
      <header style={{ padding:'24px 20px 16px', borderBottom:'1px solid rgba(43,43,43,0.12)' }}>
        <Eyebrow small color="rgba(43,43,43,0.75)">Menu · Spring 2026</Eyebrow>
        <h1 style={{ fontFamily:"'Cormorant Garamond', Georgia, serif", fontSize:36, lineHeight:1, letterSpacing:'-0.02em', margin:'12px 0 0', fontWeight:500 }}>
          The catalogue, <span style={{ fontStyle:'italic', fontWeight:400 }}>assembled</span>.
        </h1>
      </header>
      {/* Category strip */}
      <div role="tablist" aria-label="Menu categories" className="no-scrollbar" style={{ display:'flex', gap:0, overflowX:'auto', borderBottom:'1px solid rgba(43,43,43,0.12)' }}>
        {MENU_CATS.map((c, i) => (
          <button
            key={c.key} type="button" role="tab" className="tap"
            onClick={() => setCat(c.key)}
            aria-selected={cat===c.key} aria-controls={`menu-panel-${c.key}`}
            style={{
              background:'transparent', border:'none', padding:'14px 18px', cursor:'pointer', whiteSpace:'nowrap',
              fontFamily:"'Cormorant Garamond', Georgia, serif", fontSize:16, fontStyle: cat===c.key ? 'italic':'normal',
              color: cat===c.key ? '#650A30':'rgba(43,43,43,0.75)', borderRight: i<MENU_CATS.length-1 ? '1px solid rgba(43,43,43,0.12)':'none',
              position:'relative', letterSpacing:'-0.02em', minHeight:44,
            }}
          >
            {c.label}
            {cat===c.key && <span aria-hidden="true" style={{ position:'absolute', bottom:-1, left:'20%', right:'20%', height:2, background:'#650A30' }} />}
          </button>
        ))}
      </div>
      {/* Hero image for cat — portrait crop to suit vertical source photography */}
      <div id={`menu-panel-${cat}`} role="tabpanel" aria-label={current.label}>

function AccountScreen() {
  const [open, setOpen] = useState(null); // which detail row is open
  const rootRef = React.useRef(null);
  const closeBtnRef = React.useRef(null);
  const lastFocusRef = React.useRef(null);
  const [portalHost, setPortalHost] = React.useState(null);

  React.useEffect(() => {
    // find nearest scroll-hiding phone frame root (any ancestor with overflow:hidden)
    let el = rootRef.current;
    while (el) {
      const cs = getComputedStyle(el);
      if (cs.overflow === 'hidden' || cs.overflowX === 'hidden' || cs.overflowY === 'hidden') {
        if (cs.position === 'static') el.style.position = 'relative';
        setPortalHost(el);
        return;
      }
      el = el.parentElement;
    }
    setPortalHost(document.body);
  }, []);

  // Escape-key handler + focus management while sheet is open
  React.useEffect(() => {
    if (!open) return;
    lastFocusRef.current = document.activeElement;
    const onKey = (e) => { if (e.key === 'Escape') setOpen(null); };
    window.addEventListener('keydown', onKey);
    // Move focus to the close button on next tick
    const t = window.setTimeout(() => { if (closeBtnRef.current) closeBtnRef.current.focus(); }, 50);
    return () => {
      window.removeEventListener('keydown', onKey);
      window.clearTimeout(t);
      if (lastFocusRef.current && typeof lastFocusRef.current.focus === 'function') lastFocusRef.current.focus();

                }} />
                <span style={{
                  fontFamily:"'Cormorant Garamond', Georgia, serif",
                  fontSize:15, fontStyle: s.current ? 'italic' : 'normal',
                  color: s.done ? '#2B2B2B' : 'rgba(43,43,43,0.75)',
                  letterSpacing:'-0.01em',
                }}>{s.label}</span>
                <span style={{ ...hdAtomStyles.numeral, fontSize:10, color: s.done ? '#650A30' : 'rgba(43,43,43,0.75)' }}>
                  {s.time}
                </span>
              </div>
            ))}
          </div>

          {/* Primary action sits alone; secondary is a quiet text button */}
          <div style={{ marginTop:20, display:'flex', gap:12, alignItems:'stretch' }}>
            <button
              type="button" className="tap"
              onClick={() => console.log('Message', active.courier)}
              aria-label={`Message courier ${active.courier}`}
              style={{
                flex:1, background:'#650A30', color:'#FEF2E3', border:'1px solid #650A30',
                padding:'0 16px', minHeight:48, cursor:'pointer',
                fontFamily:"'Jost', sans-serif", fontSize:11, letterSpacing:'0.22em', textTransform:'uppercase', fontWeight:500,
                display:'inline-flex', alignItems:'center', justifyContent:'center', gap:8,
              }}
            >Message Budi</button>
            <button
              type="button" className="tap"
              onClick={() => console.log('Track live', active.id)}
              aria-label="Track courier live on map"
              style={{
                background:'transparent', color:'#2B2B2B', border:'1px solid rgba(43,43,43,0.3)',
                padding:'0 16px', minHeight:48, cursor:'pointer',
                fontFamily:"'Jost', sans-serif", fontSize:11, letterSpacing:'0.22em', textTransform:'uppercase', fontWeight:500,
              }}
            >Track</button>
          </div>
        </div>
      </section>

      {/* Order contents */}
      <section style={{ padding:'40px 20px 0' }}>
        <SectionHeader number={2} title="In the" titleItalic="bag" />
        <div style={{ marginTop:16 }}>
          {active.items.map((it, i) => (
            <div key={it.n} style={{ display:'grid', gridTemplateColumns:'28px 1fr auto', alignItems:'baseline', gap:14, padding:'14px 0', borderBottom: i<active.items.length-1 ? '1px solid rgba(43,43,43,0.1)':'none' }}>
              <Numeral size={11} color="rgba(43,43,43,0.75)">{String(it.n).padStart(2,'0')}</Numeral>
              <div>
                <div style={{ fontFamily:"'Cormorant Garamond', Georgia, serif", fontSize:16, letterSpacing:'-0.02em' }}>{it.name}</div>
                <div style={{ marginTop:3, fontFamily:"'Cormorant Garamond', Georgia, serif", fontStyle:'italic', fontSize:12, color:'rgba(43,43,43,0.75)' }}>Quantity · {it.qty}</div>
              </div>
              <Numeral size={13}>{it.price}</Numeral>
            </div>
          ))}
        </div>
        <div style={{ marginTop:14, paddingTop:14, borderTop:'1px solid #2B2B2B' }}>
          {[['Subtotal', active.subtotal], ['Delivery', active.delivery]].map(([k,v]) => (
            <div key={k} style={{ display:'flex', justifyContent:'space-between', padding:'4px 0' }}>
              <span style={{ fontSize:12, color:'rgba(43,43,43,0.75)' }}>{k}</span>
              <Numeral size={12} color="rgba(43,43,43,0.85)">{v}</Numeral>
            </div>
          ))}
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginTop:8, paddingTop:10, borderTop:'1px solid rgba(43,43,43,0.15)' }}>
            <span style={{ fontFamily:"'Cormorant Garamond', Georgia, serif", fontStyle:'italic', fontSize:16 }}>Total</span>
            <Numeral size={20} weight={500} color="#650A30">{active.total}</Numeral>
          </div>
        </div>
      </section>

      {/* History */}
      <section style={{ padding:'40px 20px 0' }}>
        <SectionHeader number={3} title="Previously" titleItalic="yours" />
        <div style={{ marginTop:12, borderTop:'1px solid #2B2B2B' }}>
          {history.map(h => (
            <div
              key={h.id}
              style={{
                display:'grid', gridTemplateColumns:'1fr auto', gap:14,
                padding:'16px 0', borderBottom:'1px solid rgba(43,43,43,0.12)', alignItems:'center',
              }}
            >
              <div style={{ minWidth:0 }}>
                <div style={{ fontFamily:"'Cormorant Garamond', Georgia, serif", fontSize:16, letterSpacing:'-0.01em' }}>{h.items}</div>
                <div style={{ marginTop:3, fontFamily:"'JetBrains Mono', monospace", fontSize:10.5, color:'rgba(43,43,43,0.75)', letterSpacing:'0.03em' }}>
                  {h.date} · {h.id}
                </div>
                <div style={{ marginTop:4, display:'flex', alignItems:'baseline', gap:10 }}>
                  <Numeral size={12}>{h.total}</Numeral>
                  <span style={{ fontFamily:"'Cormorant Garamond', Georgia, serif", fontStyle:'italic', fontSize:11, color:'#650A30' }}>{h.status}</span>
                </div>
              </div>
              <button
                type="button" className="tap"
                onClick={() => console.log('Reorder', h.id)}
                aria-label={`Pesan lagi — reorder ${h.items} from ${h.date}, total ${h.total}`}
                style={{
                  background:'#650A30', color:'#FEF2E3', border:'none',
                  padding:'0 14px', minHeight:44, cursor:'pointer', whiteSpace:'nowrap',
                  fontFamily:"'Jost', sans-serif", fontSize:10, letterSpacing:'0.22em',
                  textTransform:'uppercase', fontWeight:500,
                  display:'inline-flex', alignItems:'center', gap:6,
                }}
              >Pesan lagi <IconArrow size={10} color="#FEF2E3" /></button>
            </div>
          ))}
        </div>
        <div style={{ marginTop:18, textAlign:'center' }}>
          <button
            type="button" className="tap"
            onClick={() => console.log('Open all orders')}
            aria-label="Open all orders"
            style={{ fontFamily:"'Jost', sans-serif", fontSize:11, letterSpacing:'0.22em', textTransform:'uppercase', color:'#650A30', cursor:'pointer', background:'transparent', border:'none', padding:'12px 16px', minHeight:44, fontWeight:500 }}
          >
            All orders →
          </button>
        </div>
      </section>
    </div>
  );
}

// ───── APP SHELL (interactive) ─────
function AppShell() {
  const [tab, setTab] = useState('beranda');
  const [cart, setCart] = useState([]);
  const add = (item) => setCart(c => [...c, item]);

  const Screen = {
    beranda: <HomeScreen onAdd={add} onChangeTab={setTab} />,
    menu: <MenuScreen onAdd={add} cart={cart} />,
    pesanan: <OrdersScreen />,
    hadiah: <RewardsScreen />,
    akun: <AccountScreen />,
  }[tab];

  // Show bag ribbon whenever there's something in it — including on Home, so the
  // member knows they can review without digging.
  const cartVisible = cart.length > 0 && tab !== 'pesanan';
  return (
    <div style={{ width:'100%', height:'100%', position:'relative', overflow:'hidden' }}>
      <div style={{ height:'100%', overflowY:'auto', paddingBottom: cartVisible ? 68 : 0 }} className="no-scrollbar">
        {Screen}
      </div>
      {cartVisible && (
        <button
          type="button" className="tap"
          onClick={() => setTab('pesanan')}
          aria-label={`Review bag — ${cart.length} item${cart.length === 1 ? '' : 's'}`}
          style={{
            position:'absolute', left:16, right:16,
            bottom:'calc(72px + env(safe-area-inset-bottom))',
            background:'#2B2B2B', color:'#FEF2E3', padding:'14px 18px',
            minHeight:48,
            display:'flex', alignItems:'center', justifyContent:'space-between',
            zIndex:40, border:'none', cursor:'pointer', textAlign:'left',
            fontFamily:'inherit',
          }}
        >
          <div>
            <Eyebrow small color="#F5E6C8">{cart.length} {cart.length === 1 ? 'item' : 'items'} in bag</Eyebrow>
            <div style={{ fontFamily:"'Cormorant Garamond', Georgia, serif", fontStyle:'italic', fontSize:13, marginTop:2 }}>Review, then order</div>
          </div>
          <IconArrow size={16} color="#FEF2E3" />
        </button>
      )}
      <BottomNav active={tab} onSelect={setTab} />
    </div>
  );
}

// ───── MULTI-SCREEN DISPLAY ─────
function Kit() {
  const [which, setWhich] = useState('interactive');

  const frames = which === 'interactive'
    ? [{ label:'Live prototype · tap through', screen: <AppShell /> }]
    : [
        { label:'Beranda / Home', screen: <div style={{ height:'100%', overflow:'auto', position:'relative' }} className="no-scrollbar"><HomeScreen onAdd={()=>{}} /><BottomNav active="beranda" onSelect={()=>{}} /></div> },
        { label:'Menu', screen: <div style={{ height:'100%', overflow:'auto', position:'relative' }} className="no-scrollbar"><MenuScreen onAdd={()=>{}} /><BottomNav active="menu" onSelect={()=>{}} /></div> },
        { label:'Pesanan / Orders', screen: <div style={{ height:'100%', overflow:'auto', position:'relative' }} className="no-scrollbar"><OrdersScreen /><BottomNav active="pesanan" onSelect={()=>{}} /></div> },
        { label:'Hadiah / Rewards', screen: <div style={{ height:'100%', overflow:'auto', position:'relative' }} className="no-scrollbar"><RewardsScreen /><BottomNav active="hadiah" onSelect={()=>{}} /></div> },
        { label:'Akun / Account', screen: <div style={{ height:'100%', overflow:'auto', position:'relative' }} className="no-scrollbar"><AccountScreen /><BottomNav active="akun" onSelect={()=>{}} /></div> },
      ];

  return (
    <div className="stage">
      <div className="crumbs">
        <div className="eye">Häagen-Dazs Indonesia</div>
        <h1>Customer App <i>UI Kit</i></h1>
        <p>A quiet mobile loyalty & order app, rendered in burgundy, cream and gold.<br/>All screens below are composed from the same atoms.</p>
      </div>

      <div className="tabs">
        <button className={which==='interactive'?'active':''} onClick={()=>setWhich('interactive')}>Interactive</button>
        <button className={which==='gallery'?'active':''} onClick={()=>setWhich('gallery')}>Gallery · 5 screens</button>
      </div>

      <div className="phone-wrap">
        {frames.map((f, i) => (
          <div key={i} style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:12 }}>
            <Frame>{f.screen}</Frame>
            <div className="foot">{f.label}</div>
          </div>
        ))}
      </div>

      <div className="foot">© Häagen-Dazs ID — UI Kit v1</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Kit />);
</script>
</body>
</html>
