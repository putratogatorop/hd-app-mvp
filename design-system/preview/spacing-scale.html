<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--hd-cream);}
  .card{padding:24px;box-sizing:border-box;width:700px;}
  .row{display:flex;align-items:flex-end;gap:24px;}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .box{background:var(--hd-burgundy);}
  .meta{font-family:var(--font-mono);font-size:10px;color:var(--fg-tertiary);letter-spacing:.06em;text-transform:uppercase;}
  .label{font-family:var(--font-mono);font-size:11px;color:var(--fg-primary);}
</style></head>
<body>
<div class="card">
  <div class="meta" style="margin-bottom:14px">4px grid · most common values</div>
  <div class="row">
    <div class="item"><div class="box" style="width:4px;height:40px"></div><div class="label">4</div></div>
    <div class="item"><div class="box" style="width:8px;height:40px"></div><div class="label">8</div></div>
    <div class="item"><div class="box" style="width:12px;height:40px"></div><div class="label">12</div></div>
    <div class="item"><div class="box" style="width:16px;height:40px"></div><div class="label">16</div></div>
    <div class="item"><div class="box" style="width:20px;height:40px"></div><div class="label">20</div></div>
    <div class="item"><div class="box" style="width:24px;height:40px"></div><div class="label">24</div></div>
    <div class="item"><div class="box" style="width:32px;height:40px"></div><div class="label">32</div></div>
    <div class="item"><div class="box" style="width:48px;height:40px"></div><div class="label">48</div></div>
    <div class="item"><div class="box" style="width:64px;height:40px"></div><div class="label">64</div></div>
  </div>
</div>
</body></html>
