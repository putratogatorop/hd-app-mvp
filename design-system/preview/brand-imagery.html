<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--hd-cream);}
  .card{padding:20px;box-sizing:border-box;width:700px;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .img{aspect-ratio:1;background:var(--hd-cream-deep);border:1px solid rgba(26,20,20,.08);overflow:hidden;}
  .img img{width:100%;height:100%;object-fit:cover;display:block;}
  .cap{font-family:var(--font-display);font-style:italic;font-size:11px;color:var(--fg-tertiary);margin-top:6px;display:block;}
  .meta{font-family:var(--font-mono);font-size:10px;color:var(--fg-tertiary);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;}
</style></head>
<body>
<div class="card">
  <div class="meta">Imagery · warm, unsaturated, cream-friendly tones · never b&w, never grainy</div>
  <div class="grid">
    <div><div class="img"><img src="../assets/imagery/menu-ice-cream-flavors.jpg"></div><span class="cap">Ice Cream</span></div>
    <div><div class="img"><img src="../assets/imagery/menu-love-the-mix.jpg"></div><span class="cap">The Mix</span></div>
    <div><div class="img"><img src="../assets/imagery/menu-coffee-time.jpg"></div><span class="cap">Coffee</span></div>
    <div><div class="img"><img src="../assets/imagery/menu-drinks-tea.jpg"></div><span class="cap">Tea</span></div>
    <div><div class="img"><img src="../assets/imagery/menu-refresh-me.jpg"></div><span class="cap">Refresh</span></div>
    <div><div class="img"><img src="../assets/imagery/promo-prosperity.jpg"></div><span class="cap">Prosperity</span></div>
    <div><div class="img"><img src="../assets/imagery/promo-buy1get1.jpg"></div><span class="cap">Promo</span></div>
    <div><div class="img"><img src="../assets/imagery/promo-giveaway.png"></div><span class="cap">Giveaway</span></div>
  </div>
</div>
</body></html>
