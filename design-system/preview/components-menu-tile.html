<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--hd-cream);}
  .card{padding:20px;box-sizing:border-box;width:700px;}
  .tile{background:var(--hd-paper);border:1px solid rgba(26,20,20,.1);width:220px;overflow:hidden;}
  .img{aspect-ratio:4/5;background:var(--hd-cream-deep);position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .img .num{position:absolute;top:10px;left:10px;font-family:var(--font-sans);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--hd-burgundy);}
  .img img{width:100%;height:100%;object-fit:cover;}
  .body{padding:14px;}
  .cat{font-family:var(--font-sans);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:rgba(26,20,20,.5);}
  .t{font-family:var(--font-display);font-size:18px;line-height:1.1;letter-spacing:-.02em;margin-top:6px;}
  .foot{margin-top:12px;padding-top:10px;border-top:1px solid rgba(26,20,20,.1);display:flex;justify-content:space-between;align-items:center;}
  .price{font-family:var(--font-mono);font-size:14px;}
  .add{width:32px;height:32px;border:1px solid rgba(26,20,20,.3);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;color:var(--hd-ink);}
  .row{display:flex;gap:16px;}
</style></head>
<body>
<div class="card">
  <div class="row">
    <div class="tile">
      <div class="img"><span class="num">001</span><img src="../assets/imagery/menu-ice-cream-flavors.jpg"></div>
      <div class="body">
        <div class="cat">Ice Cream</div>
        <div class="t">Vanilla Caramel Brownie</div>
        <div class="foot"><span class="price">Rp 65.000</span><span class="add">+</span></div>
      </div>
    </div>
    <div class="tile">
      <div class="img"><span class="num">002</span><img src="../assets/imagery/menu-love-the-mix.jpg"></div>
      <div class="body">
        <div class="cat">Patisserie</div>
        <div class="t">Strawberry Shortcake</div>
        <div class="foot"><span class="price">Rp 95.000</span><span class="add">+</span></div>
      </div>
    </div>
    <div class="tile">
      <div class="img"><span class="num">003</span><img src="../assets/imagery/menu-drinks-tea.jpg"></div>
      <div class="body">
        <div class="cat">Beverage</div>
        <div class="t">Iced Matcha</div>
        <div class="foot"><span class="price">Rp 42.000</span><span class="add">+</span></div>
      </div>
    </div>
  </div>
</div>
</body></html>
