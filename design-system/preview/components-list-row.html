<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--hd-cream);}
  .card{padding:20px;box-sizing:border-box;width:700px;}
  .section{background:var(--hd-paper);border:1px solid rgba(26,20,20,.1);}
  .section > *{padding:18px 20px;display:flex;align-items:center;gap:20px;transition:background 300ms;cursor:pointer;}
  .section > * + *{border-top:1px solid rgba(26,20,20,.1);}
  .mode:hover{background:var(--hd-cream-deep);}
  .mode.active{background:var(--hd-burgundy);color:var(--hd-cream);}
  .roman{font-family:var(--font-mono);font-size:13px;color:rgba(26,20,20,.4);min-width:24px;}
  .mode.active .roman{color:var(--hd-gold-light);}
  .t{flex:1;}
  .t .name{font-family:var(--font-display);font-size:20px;letter-spacing:-.02em;line-height:1;}
  .mode.active .t .name{font-style:italic;}
  .t .tag{font-family:var(--font-display);font-style:italic;font-size:12px;opacity:.55;margin-top:4px;}
  .mode.active .t .tag{opacity:.7;color:var(--hd-cream);}
  .ico{color:rgba(26,20,20,.5);}
  .mode.active .ico{color:var(--hd-cream);}
</style></head>
<body>
<div class="card">
  <div class="section">
    <div class="mode">
      <span class="roman">I</span>
      <div class="t"><div class="name">Pick Up</div><div class="tag">Collected at the counter</div></div>
      <span class="ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg></span>
    </div>
    <div class="mode active">
      <span class="roman">II</span>
      <div class="t"><div class="name">Delivery</div><div class="tag">Brought to the door</div></div>
      <span class="ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"/><path d="M15 18H9"/><path d="M19 18h2a1 1 0 0 0 1-1v-3.65a1 1 0 0 0-.22-.624l-3.48-4.35A1 1 0 0 0 17.52 8H14"/><circle cx="17" cy="18" r="2"/><circle cx="7" cy="18" r="2"/></svg></span>
    </div>
    <div class="mode">
      <span class="roman">III</span>
      <div class="t"><div class="name">Dine In</div><div class="tag">At table, unhurried</div></div>
      <span class="ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="m16 2-2.3 2.3a3 3 0 0 0 0 4.2l1.8 1.8a3 3 0 0 0 4.2 0L22 8"/><path d="M15 15 3.3 3.3a4.2 4.2 0 0 0 0 6l7.3 7.3c.7.7 2 .7 2.8 0L15 15Z"/><path d="m2.1 21.8 6.4-6.3"/><path d="m19 5-7 7"/></svg></span>
    </div>
  </div>
</div>
</body></html>
