<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--hd-cream);}
  .card{padding:24px;box-sizing:border-box;width:700px;}
  .specimen + .specimen{margin-top:22px;padding-top:18px;border-top:1px solid var(--rule-soft);}
  .meta{font-family:var(--font-mono);font-size:10px;color:var(--fg-quaternary);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
  h1.x{font-family:var(--font-display);font-size:64px;line-height:.92;letter-spacing:-.02em;color:var(--fg-primary);margin:0;}
  h2.x{font-family:var(--font-display);font-size:40px;line-height:.95;letter-spacing:-.025em;color:var(--fg-primary);margin:0;}
  h3.x{font-family:var(--font-display);font-size:28px;line-height:1.02;letter-spacing:-.02em;color:var(--fg-primary);margin:0;}
</style></head>
<body>
<div class="card">
  <div class="specimen">
    <div class="meta">display-xl · Cormorant Garamond 64 / 0.92</div>
    <h1 class="x">Ice Cream, <i>perfected.</i></h1>
  </div>
  <div class="specimen">
    <div class="meta">display-lg · Cormorant Garamond 40 / 0.95</div>
    <h2 class="x">The <i>Dividend</i></h2>
  </div>
  <div class="specimen">
    <div class="meta">display-md · Cormorant Garamond 28 / 1.02</div>
    <h3 class="x">Rewards, unclaimed</h3>
  </div>
</div>
</body></html>
