<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HD Promo Popup v3 — Image-based</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
  .phone-frame { width: 375px; min-height: 812px; background: #FFF8F0; border-radius: 44px; overflow: hidden; position: relative; box-shadow: 0 0 0 3px #333, 0 20px 60px rgba(0,0,0,0.4); }
  .home-bg { filter: blur(3px) brightness(0.7); padding: 60px 20px 20px; }
  .home-bg .banner { height: 180px; background: linear-gradient(135deg, #C8102E, #7a0a1e); border-radius: 16px; }
  .home-bg .card { height: 70px; background: #fff; border-radius: 16px; margin: -16px 16px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .home-bg .row { height: 36px; background: #f0ebe4; border-radius: 10px; margin-top: 14px; }
  .popup-overlay { position: absolute; inset: 0; z-index: 10; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; padding: 50px 24px; }
  .popup { width: 100%; max-width: 330px; position: relative; }
  .close-btn { position: absolute; top: -16px; right: -8px; z-index: 30; width: 36px; height: 36px; border-radius: 50%; background: #fff; border: none; color: #666; font-size: 18px; font-weight: 600; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
  .popup-image { width: 100%; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
  .popup-image img { width: 100%; height: auto; display: block; }
  .popup-cta { margin-top: 16px; }
  .cta-btn { width: 100%; padding: 16px; border: none; border-radius: 16px; background: #fff; color: #C8102E; font-size: 15px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
  .mockup-label { text-align: center; margin-bottom: 20px; font-size: 13px; color: #888; font-weight: 500; }
</style>
</head>
