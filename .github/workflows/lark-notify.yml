name: Lark Notifications

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
  pull_request:
    types: [opened, ready_for_review, closed]
  workflow_run:
    workflows: ["Deploy to Vercel"]
    types: [completed]

env:
  LARK_APP_ID:     ${{ secrets.LARK_APP_ID }}
  LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}

jobs:
  # 芒聰聙芒聰聙 Helper: get a tenant_access_token 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  get-token:
    name: Get Lark Token
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_run'
    outputs:
      token: ${{ steps.token.outputs.token }}
    steps:
      - name: Fetch token
        id: token
        run: |
          TOKEN=$(curl -sf -X POST \
            "https://open.larksuite.com/open-apis/auth/v3/tenant_access_token/internal" \
            -H "Content-Type: application/json" \
            -d "{\"app_id\":\"$LARK_APP_ID\",\"app_secret\":\"$LARK_APP_SECRET\"}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['tenant_access_token'])")
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

  # 芒聰聙芒聰聙 Push 芒聠聮 Git Activity (Tech Lead) 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  notify-push:
    name: Notify Push
    needs: get-token
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Send message
        env:
          TOKEN: ${{ needs.get-token.outputs.token }}
          CHAT_ID: ${{ secrets.LARK_CHAT_TECH_LEAD }}
        run: |
          BRANCH="${{ github.ref_name }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          AUTHOR="${{ github.actor }}"
          MSG="${{ github.event.head_commit.message }}"
          REPO="${{ github.repository }}"
          # Truncate long commit messages
          MSG="${MSG:0:100}"

          curl -sf -X POST \
            "https://open.larksuite.com/open-apis/im/v1/messages?receive_id_type=chat_id" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"receive_id\": \"$CHAT_ID\",
              \"msg_type\": \"text\",
              \"content\": \"{\\\"text\\\":\\\"冒聼聰聙 Push to \`$BRANCH\`\\n冒聼聭陇 $AUTHOR\\n冒聼聯聺 $MSG\\n冒聼聰聴 https://github.com/$REPO/commit/$SHORT_SHA\\\"}\"
            }"

  # 芒聰聙芒聰聙 PR opened/ready 芒聠聮 PM Decisions 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  notify-pr-opened:
    name: Notify PR Opened
    needs: get-token
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' &&
      (github.event.action == 'opened' || github.event.action == 'ready_for_review')
    steps:
      - name: Send message
        env:
          TOKEN: ${{ needs.get-token.outputs.token }}
          CHAT_ID: ${{ secrets.LARK_CHAT_PM }}
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          AUTHOR="${{ github.actor }}"
          BRANCH="${{ github.event.pull_request.head.ref }}"
          BASE="${{ github.event.pull_request.base.ref }}"

          curl -sf -X POST \
            "https://open.larksuite.com/open-apis/im/v1/messages?receive_id_type=chat_id" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"receive_id\": \"$CHAT_ID\",
              \"msg_type\": \"text\",
              \"content\": \"{\\\"text\\\":\\\"冒聼聰聰 New PR: $PR_TITLE\\n冒聼聭陇 $AUTHOR | \`$BRANCH\` 芒聠聮 \`$BASE\`\\n冒聼聰聴 $PR_URL\\\"}\"
            }"

  # 芒聰聙芒聰聙 PR merged 芒聠聮 PM Decisions + Git Activity 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  notify-pr-merged:
    name: Notify PR Merged
    needs: get-token
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true
    strategy:
      matrix:
        chat: [PM, TECH_LEAD]
    steps:
      - name: Send message to ${{ matrix.chat }}
        env:
          TOKEN: ${{ needs.get-token.outputs.token }}
          CHAT_PM:        ${{ secrets.LARK_CHAT_PM }}
          CHAT_TECH_LEAD: ${{ secrets.LARK_CHAT_TECH_LEAD }}
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          AUTHOR="${{ github.actor }}"
          BRANCH="${{ github.event.pull_request.head.ref }}"
          BASE="${{ github.event.pull_request.base.ref }}"

          if [ "${{ matrix.chat }}" = "PM" ]; then
            CHAT_ID="$CHAT_PM"
          else
            CHAT_ID="$CHAT_TECH_LEAD"
          fi

          curl -sf -X POST \
            "https://open.larksuite.com/open-apis/im/v1/messages?receive_id_type=chat_id" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"receive_id\": \"$CHAT_ID\",
              \"msg_type\": \"text\",
              \"content\": \"{\\\"text\\\":\\\"芒聹聟 PR Merged: $PR_TITLE\\n冒聼聭陇 $AUTHOR | \`$BRANCH\` 芒聠聮 \`$BASE\`\\n冒聼聰聴 $PR_URL\\\"}\"
            }"

  # 芒聰聙芒聰聙 Deploy result 芒聠聮 Deploy + (QA on failure) 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  notify-deploy:
    name: Notify Deploy
    needs: get-token
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run'
    steps:
      - name: Send deploy notification
        env:
          TOKEN:          ${{ needs.get-token.outputs.token }}
          CHAT_MOBILE:    ${{ secrets.LARK_CHAT_MOBILE }}
          CHAT_QA:        ${{ secrets.LARK_CHAT_QA }}
        run: |
          STATUS="${{ github.event.workflow_run.conclusion }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          RUN_URL="${{ github.event.workflow_run.html_url }}"
          COMMIT="${{ github.event.workflow_run.head_sha }}"
          SHORT_SHA="${COMMIT:0:7}"

          if [ "$STATUS" = "success" ]; then
            EMOJI="冒聼職聙"
            MSG="Deploy success on \`$BRANCH\` ($SHORT_SHA)"
          else
            EMOJI="芒聺聦"
            MSG="Deploy FAILED on \`$BRANCH\` ($SHORT_SHA)"
          fi

          # Always notify Deploy group
          curl -sf -X POST \
            "https://open.larksuite.com/open-apis/im/v1/messages?receive_id_type=chat_id" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"receive_id\": \"$CHAT_MOBILE\",
              \"msg_type\": \"text\",
              \"content\": \"{\\\"text\\\":\\\"$EMOJI $MSG\\n冒聼聰聴 $RUN_URL\\\"}\"
            }"

          # Also notify QA Bugs group on failure
          if [ "$STATUS" != "success" ]; then
            curl -sf -X POST \
              "https://open.larksuite.com/open-apis/im/v1/messages?receive_id_type=chat_id" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                \"receive_id\": \"$CHAT_QA\",
                \"msg_type\": \"text\",
                \"content\": \"{\\\"text\\\":\\\"$EMOJI Deploy failed on \`$BRANCH\`! Please check logs.\\n冒聼聰聴 $RUN_URL\\\"}\"
              }"
          fi
